# Custom buildy build script for GLFW 3.4
# Mirrors the override used by vulkease and monstero.

project:
  name: glfw3
  description: "GLFW static library build"

environment:
  compile:
    c_standard: "c11"
    warnings: default
    flags: ["-fPIC"]

  configurations:
    debug:
      optimization: none
      symbols: true
    release:
      optimization: speed

targets:
  static_libraries:
    - name: glfw3
      language: c

      sources:
        - "src/context.c"
        - "src/init.c"
        - "src/input.c"
        - "src/monitor.c"
        - "src/platform.c"
        - "src/vulkan.c"
        - "src/window.c"
        - "src/egl_context.c"
        - "src/osmesa_context.c"
        - "src/null_init.c"
        - "src/null_monitor.c"
        - "src/null_window.c"
        - "src/null_joystick.c"
        - linux:
            - "src/posix_time.c"
            - "src/posix_thread.c"
            - "src/posix_module.c"
            - "src/posix_poll.c"
            - "src/linux_joystick.c"
            - "src/x11_init.c"
            - "src/x11_monitor.c"
            - "src/x11_window.c"
            - "src/xkb_unicode.c"
            - "src/glx_context.c"
        - windows:
            - "src/win32_init.c"
            - "src/win32_joystick.c"
            - "src/win32_module.c"
            - "src/win32_monitor.c"
            - "src/win32_thread.c"
            - "src/win32_time.c"
            - "src/win32_window.c"
            - "src/wgl_context.c"

      defines:
        - linux:
            - "_GLFW_X11"
            - "_POSIX_C_SOURCE=200809L"
        - windows:
            - "_GLFW_WIN32"
            - "_CRT_SECURE_NO_WARNINGS"
            - "UNICODE"
            - "_UNICODE"
        - debug:
            - "_DEBUG"
        - release:
            - "NDEBUG"

      include_dirs:
        - "include"
        - "src"
