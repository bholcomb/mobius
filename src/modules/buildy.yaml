project:
  name: mobius-modules
  description: "Built-in Mobius plugin modules"

targets:
  shared_libraries:
    - name: math
      language: cpp
      output_prefix: ""
      sources: ["math/math_plugin.cpp"]
      include_dirs:
        - "${workspace}/include"
        - "${workspace}/src"
        - "${workspace}/src/mobius"
      libs: ["mobius-core", "m", "dl"]
      depends_on:
        targets: ["mobius-core"]
