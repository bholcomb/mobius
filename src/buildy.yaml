project:
  name: mobius-core
  description: "Mobius interpreter library and CLI"

targets:
  shared_libraries:
    - name: mobius-core
      language: cpp
      sources:
        - "mobius/data/*.cpp"
        - "mobius/fiber/*.cpp"
        - "mobius/frontend/*.cpp"
        - "mobius/internal/*.cpp"
        - "mobius/library/*.cpp"
        - "mobius/plugin/*.cpp"
        - "mobius/state/*.cpp"
        - "mobius/util/*.cpp"
        - "mobius/vm/*.cpp"
        - "mobius/repl.cpp"
      include_dirs:
        - "${workspace}/include"
        - "${workspace}/src"
        - "${workspace}/src/mobius"
      flags:
        - "-fvisibility=hidden"
        - "-DMOBIUS_BUILDING"
      libs: ["pthread"]

  executables:
    - name: mobius
      language: cpp
      sources: ["main.cpp"]
      include_dirs:
        - "${workspace}/include"
        - "${workspace}/src"
        - "${workspace}/src/mobius"
      libs: ["mobius-core", "m", "dl", "pthread"]
      depends_on:
        targets: ["mobius-core"]
