project:
  name: mobius-glfw-package
  description: "GLFW package candidate for Mobius"

environment:
  compile:
    cpp_standard: "c++17"
    warnings: extra

targets:
  shared_libraries:
    - name: glfw
      language: cpp
      output_prefix: ""
      sources: ["glfw_plugin.cpp"]
      include_dirs:
        - "${workspace}/include"
        - "${workspace}/src"
        - "${workspace}/src/mobius"
      libs: ["mobius-core"]
      deps: ["glfw3"]
      depends_on:
        targets: ["mobius-core"]
