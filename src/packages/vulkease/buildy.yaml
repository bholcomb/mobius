project:
  name: mobius-vulkease-package
  description: "VulkEase package candidate for Mobius"

environment:
  compile:
    cpp_standard: "c++17"
    warnings: extra
  link:
    flags: ["/home/bholcomb/projects/side/vulkease/bin/libvulkease.so"]

targets:
  shared_libraries:
    - name: vulkease
      language: cpp
      output_prefix: ""
      sources: ["vulkease_plugin.cpp"]
      include_dirs:
        - "${workspace}/include"
        - "${workspace}/src"
        - "${workspace}/src/mobius"
        - "/home/bholcomb/projects/side/vulkease/src"
      libs:
        - mobius-core
      depends_on:
        targets: ["mobius-core"]
