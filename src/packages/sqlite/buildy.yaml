project:
  name: mobius-sqlite-package
  description: "SQLite package candidate for Mobius"

environment:
  compile:
    cpp_standard: "c++17"
    warnings: extra

targets:
  shared_libraries:
    - name: sqlite
      language: cpp
      output_prefix: ""
      sources: ["sqlite_plugin.cpp"]
      include_dirs:
        - "${workspace}/include"
        - "${workspace}/src"
        - "${workspace}/src/mobius"
      libs: ["mobius-core"]
      deps: ["sqlite3"]
      depends_on:
        targets: ["mobius-core"]
