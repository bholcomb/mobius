project:
  name: mobius
  version: "0.1.0"
  description: "Mobius Scripting Language"

environment:
  compile:
    cpp_standard: "c++17"
    warnings: extra
    flags: []

  configurations:
    debug:
      optimization: none
      symbols: true
    release:
      optimization: speed
      defines: ["NDEBUG"]
      compile:
        remove_flags: ["-O2"]
        flags: ["-O3", "-march=native", "-funroll-loops", "-flto"]
      link:
        flags: ["-flto", "-Wl,-O1"]

workspace:
  modules:
    - src
    - src/modules
    - src/packages/sqlite
    - src/packages/glfw
    - src/packages/vulkease
    - src/packages/monstro
    - examples

dependencies:
  file: buildy_config/dependencies.yaml


staging:
  name: "mobius"
  destination: "${workspace}"
  contents:
    - folder: "bin"
      files:
        - "${out_dir}/bin/mobius"
        - "${out_dir}/bin/libmobius-core.so"
    - folder: "bin/modules/compression"
      files:
        - "src/modules/compression/module.yaml"
        - "src/modules/compression/compression.mob"
    - folder: "bin/modules/compression/native/linux-x86_64"
      files:
        - "${out_dir}/bin/compression.so"
    - folder: "bin/modules/math"
      files:
        - "src/modules/math/module.yaml"
    - folder: "bin/modules/math/native/linux-x86_64"
      files:
        - "${out_dir}/bin/math.so"
    - folder: "bin/modules/os"
      files:
        - "src/modules/os/module.yaml"
    - folder: "bin/modules/os/native/linux-x86_64"
      files:
        - "${out_dir}/bin/os.so"
    - folder: "bin/modules/regex"
      files:
        - "src/modules/regex/module.yaml"
    - folder: "bin/modules/regex/native/linux-x86_64"
      files:
        - "${out_dir}/bin/regex.so"
    - folder: "bin/modules/json"
      files:
        - "src/modules/json/module.yaml"
    - folder: "bin/modules/json/native/linux-x86_64"
      files:
        - "${out_dir}/bin/json.so"
    - folder: "bin/modules/toml"
      files:
        - "src/modules/toml/module.yaml"
    - folder: "bin/modules/toml/native/linux-x86_64"
      files:
        - "${out_dir}/bin/toml.so"
    - folder: "bin/modules/datetime"
      files:
        - "src/modules/datetime/module.yaml"
    - folder: "bin/modules/datetime/native/linux-x86_64"
      files:
        - "${out_dir}/bin/datetime.so"
    - folder: "bin/modules/url"
      files:
        - "src/modules/url/module.yaml"
    - folder: "bin/modules/url/native/linux-x86_64"
      files:
        - "${out_dir}/bin/url.so"
    - folder: "bin/modules/crypto"
      files:
        - "src/modules/crypto/module.yaml"
    - folder: "bin/modules/crypto/native/linux-x86_64"
      files:
        - "${out_dir}/bin/crypto.so"
    - folder: "bin/modules/yaml"
      files:
        - "src/modules/yaml/module.yaml"
    - folder: "bin/modules/yaml/native/linux-x86_64"
      files:
        - "${out_dir}/bin/yaml.so"
    - folder: "bin/modules/http"
      files:
        - "src/modules/http/module.yaml"
        - "src/modules/http/http.mob"
    - folder: "bin/modules/http/native/linux-x86_64"
      files:
        - "${out_dir}/bin/http.so"
    - folder: "bin/modules/web"
      files:
        - "src/modules/web/module.yaml"
        - "src/modules/web/web.mob"
    - folder: "bin/modules/websocket"
      files:
        - "src/modules/websocket/module.yaml"
        - "src/modules/websocket/websocket.mob"
    - folder: "bin/modules/websocket/native/linux-x86_64"
      files:
        - "${out_dir}/bin/websocket.so"
    - folder: "bin/modules/socket"
      files:
        - "src/modules/socket/module.yaml"
    - folder: "bin/modules/socket/native/linux-x86_64"
      files:
        - "${out_dir}/bin/socket.so"
    - folder: "packages/sqlite"
