project:
  name: mobius
  version: "0.1.0"
  description: "Mobius Scripting Language"

environment:
  compile:
    cpp_standard: "c++17"
    warnings: extra
    flags: ["-fpermissive"]

  configurations:
    debug:
      optimization: none
      symbols: true
    release:
      optimization: speed
      defines: ["NDEBUG"]
      remove_flags: ["-O2"]
      flags: ["-O3", "-march=native", "-funroll-loops", "-flto"]
      link_flags: ["-flto", "-Wl,-O1"]

workspace:
  modules:
    - src
    - src/modules
    - examples
