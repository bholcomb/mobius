project:
  name: mobius
  version: "0.1.0"
  description: "Mobius Scripting Language"

environment:
  compile:
    cpp_standard: "c++17"
    warnings: extra
    flags: ["-fpermissive"]

  configurations:
    debug:
      optimization: none
      symbols: true
    release:
      optimization: speed
      defines: ["NDEBUG"]

workspace:
  modules:
    - src
    - src/modules
    - examples

staging:
  name: mobius
  destination: "${workspace}/bin"
  use_symlinks: true

  contents:
    - folder: "."
      targets:
        - mobius

    - folder: lib
      targets:
        - mobius-core

    - folder: modules
      targets:
        - math
        - text_processing

    - folder: examples
      targets:
        - embedding_example
        - simple_embedding
        - game_engine
        - multi_environment_demo
        - simple_userdata_test
        - stack_api_test
