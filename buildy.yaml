        - ".buildy_cache/deps/sqlite3/build/${platform}-${arch}-${config}/bin/libsqlite3.so"
    - folder: "packages/glfw"
      files:
        - "src/packages/glfw/module.yaml"
        - "src/packages/glfw/glfw.mob"
    - folder: "packages/glfw/native/linux-x86_64"
      files:
        - "${out_dir}/bin/glfw.so"
    - folder: "packages/vulkease"
      files:
        - "src/packages/vulkease/module.yaml"
        - "src/packages/vulkease/vulkease.mob"
    - folder: "packages/vulkease/native/linux-x86_64"
      files:
        - "${out_dir}/bin/vulkease.so"
        - "/home/bholcomb/projects/side/vulkease/bin/libvulkease.so"
    - folder: "packages/monstro"
      files:
        - "src/packages/monstro/module.yaml"
        - "src/packages/monstro/monstro.mob"
    - folder: "packages/monstro/native/linux-x86_64"
      files:
