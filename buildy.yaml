project:
  name: mobius
  version: "0.1.0"
  description: "Mobius Scripting Language"

environment:
  compile:
    cpp_standard: "c++17"
    warnings: extra
    flags: []

  configurations:
    debug:
      optimization: none
      symbols: true
    release:
      optimization: speed
      defines: ["NDEBUG"]
      compile:
        remove_flags: ["-O2"]
        flags: ["-O3", "-march=native", "-funroll-loops", "-flto"]
      link:
        flags: ["-flto", "-Wl,-O1"]

workspace:
  modules:
    - src
    - src/modules
    - examples


staging:
  name: "mobius"
  destination: "${workspace}"
  contents:
    - folder: "bin"
      files:
        - "${out_dir}/bin/mobius"
        - "${out_dir}/bin/libmobius-core.so"
    - folder: "bin/modules"
      files:
        - "${out_dir}/bin/math.so"
        - "${out_dir}/bin/os.so"
        - "${out_dir}/bin/regex.so"
        - "${out_dir}/bin/json.so"
        - "${out_dir}/bin/toml.so"
        - "${out_dir}/bin/datetime.so"
        - "${out_dir}/bin/url.so"
        - "${out_dir}/bin/crypto.so"
        - "${out_dir}/bin/yaml.so"
        - "${out_dir}/bin/http.so"
        - "src/modules/http/http.mob"
        - "${out_dir}/bin/websocket.so"
        - "src/modules/websocket/websocket.mob"
        - "${out_dir}/bin/socket.so"
        - "${out_dir}/bin/text_processing.so"
