project:
  name: mobius
  version: "0.1.0"
  description: "Mobius Scripting Language"

environment:
  compile:
    cpp_standard: "c++17"
    warnings: extra
    flags: ["-fpermissive"]

  configurations:
    debug:
      optimization: none
      symbols: true
    release:
      optimization: speed
      defines: ["NDEBUG"]
      compile:
        remove_flags: ["-O2"]
        flags: ["-O3", "-march=native", "-funroll-loops", "-flto"]
      link:
        flags: ["-flto", "-Wl,-O1"]

workspace:
  modules:
    - src
    - src/modules
    - examples


staging:
  name: "mobius"
  destination: "${workspace}"
  contents:
    - folder: "bin"
      files:
        - "${out_dir}/bin/mobius"
        - "${out_dir}/bin/libmobius-core.so"
    - folder: "bin/modules"
      files:
        - "${out_dir}/bin/math.so"
        - "${out_dir}/bin/os.so"
        - "${out_dir}/bin/text_processing.so"
